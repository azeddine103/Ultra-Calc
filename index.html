<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>Ultra-Calc</title>
	<link rel="icon" type="image/png" href="calculator.png">
	<link rel="apple-touch-icon" href="calculator.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --text: #f8fafc; --num: #334155; --op: #0ea5e9;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* 1. Kurz-Verlauf (6 Zeilen) */
        .mini-history {
            flex: 0 0 18%; background: rgba(0,0,0,0.2);
            padding: 10px 20px; display: flex; flex-direction: column;
            justify-content: flex-end; gap: 4px; overflow: hidden;
        }
        .hist-line {
            font-size: 0.85rem; color: #64748b; text-align: right;
            cursor: pointer; transition: 0.2s; white-space: nowrap;
        }
        .hist-line:hover { color: var(--accent); }

        /* Display */
        .display-section {
            flex: 0 0 12%; padding: 0 20px 10px 20px;
            display: flex; align-items: flex-end; justify-content: flex-end;
        }
        #main-line { font-size: 3.2rem; font-weight: 300; width: 100%; text-align: right; overflow-x: auto; }

        /* Keypad */
        .keypad {
            flex: 1; display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 1px; background: #334155;
        }
        button {
            border: none; background: var(--card); color: white;
            font-size: 1.2rem; cursor: pointer; transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { background: var(--num); filter: brightness(1.3); }
        .btn-op { color: var(--accent); font-weight: bold; }
        .btn-sci { background: #162031; color: #94a3b8; font-size: 0.9rem; }
        .btn-equal { background: var(--op); font-weight: bold; }
        .btn-ac { color: #ef4444; }

        /* PWA Tutorial Overlay */
        #pwa-tutorial {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px; text-align: center;
        }
        .tutor-card { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--accent); max-width: 350px; }
        
        /* Icon Generator UI */
        #icon-gen-ui {
            position: fixed; top: 10px; left: 10px; background: #fff;
            padding: 10px; border-radius: 10px; color: #000; z-index: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 10px; display: none;
        }
    </style>
</head>
<body>

    <div id="pwa-tutorial">
        <div class="tutor-card">
            <span style="font-size:3rem">📲</span>
            <h2>App installieren</h2>
            <div id="platform-instructions" style="text-align:left; margin:20px 0; font-size:0.9rem; line-height:1.5;"></div>
            <button onclick="closeTutorial()" style="background:var(--op); color:white; padding:12px; width:100%; border-radius:10px; border:none; font-weight:bold;">Starten</button>
        </div>
    </div>

    <div id="icon-gen-ui">
        <canvas id="iconCanvas" width="512" height="512" style="width:60px; height:60px; border:1px solid #000;"></canvas><br>
        <button onclick="downloadIcon()">Icon Speichern</button>
        <button onclick="this.parentElement.style.display='none'">X</button>
    </div>

    <div class="mini-history" id="mini-history"></div>
    <div class="display-section">
        <div id="main-line">0</div>
    </div>

    <div class="keypad">
        <button class="btn-sci" onclick="func('Math.PI')">π</button>
        <button class="btn-sci" onclick="func('Math.E')">e</button>
        <button class="btn-sci" onclick="append('**')">xʸ</button>
        <button class="btn-sci" onclick="func('Math.sqrt')">√</button>
        <button class="btn-ac" onclick="clearAll()">AC</button>

        <button class="btn-sci" onclick="func('Math.sin')">sin</button>
        <button class="btn-sci" onclick="func('Math.cos')">cos</button>
        <button class="btn-sci" onclick="append('(')">(</button>
        <button class="btn-sci" onclick="append(')')">)</button>
        <button class="btn-op" onclick="backspace()">⌫</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="btn-op" onclick="append('/')">÷</button>
        <button class="btn-sci" onclick="showFullHistory()">HIST</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="btn-op" onclick="append('*')">×</button>
        <button class="btn-sci" onclick="func('Math.log10')">log</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="btn-op" onclick="append('-')">−</button>
        <button class="btn-equal" style="grid-row: span 2;" onclick="calculate()">=</button>

        <button onclick="append('0')" style="grid-column: span 2;">0</button>
        <button onclick="append('.')">.</button>
        <button class="btn-op" onclick="append('+')">+</button>
    </div>

    <script>
        const mainLine = document.getElementById('main-line');
        const miniHistory = document.getElementById('mini-history');
        let history = JSON.parse(localStorage.getItem('ultra_calc_final')) || [];
        let isResultDisplayed = false;

        // --- Logik ---
        function append(val) {
            if (isResultDisplayed) {
                if (!isNaN(val) || val === '.') mainLine.innerText = '0';
                isResultDisplayed = false;
            }
            if (mainLine.innerText === '0' && !isNaN(val)) mainLine.innerText = val;
            else mainLine.innerText += val;
        }

        function func(name) {
            if (isResultDisplayed) { mainLine.innerText = '0'; isResultDisplayed = false; }
            if (name.includes('Math.P') || name.includes('Math.E')) append(Math[name.split('.')[1]].toFixed(6));
            else mainLine.innerText = name + "(";
        }

        function calculate() {
            try {
                let expr = mainLine.innerText.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                let res = eval(expr);
                let formattedRes = Number.isInteger(res) ? res : parseFloat(res.toFixed(8));
                saveHistory(mainLine.innerText, formattedRes);
                mainLine.innerText = formattedRes;
                isResultDisplayed = true;
            } catch { mainLine.innerText = "Error"; isResultDisplayed = true; }
        }

        function saveHistory(expr, res) {
            history.unshift({ expr, res });
            localStorage.setItem('ultra_calc_final', JSON.stringify(history.slice(0, 50)));
            updateMiniHistory();
        }

        function updateMiniHistory() {
            miniHistory.innerHTML = '';
            history.slice(0, 6).reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'hist-line';
                div.innerText = `${item.expr} = ${item.res}`;
                div.onclick = () => { mainLine.innerText = item.res; isResultDisplayed = true; };
                miniHistory.appendChild(div);
            });
        }

        function showFullHistory() {
            let fullText = history.map(i => `${i.expr} = ${i.res}`).join('\n');
            alert(history.length > 0 ? "Vollständiger Verlauf:\n\n" + fullText : "Verlauf leer");
        }

        function clearAll() { mainLine.innerText = '0'; isResultDisplayed = false; }
        function backspace() { mainLine.innerText = mainLine.innerText.slice(0, -1) || '0'; }

        // --- PWA & Icon ---
        function checkTutorial() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (!localStorage.getItem('tutor_done') && !isStandalone) {
                document.getElementById('pwa-tutorial').style.display = 'flex';
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                document.getElementById('platform-instructions').innerHTML = isIOS ? 
                    '1. Tippe auf das <b>Teilen-Icon</b>.<br>2. Wähle <b>"Zum Home-Bildschirm"</b>.' : 
                    '1. Tippe auf die <b>3 Punkte</b>.<br>2. Wähle <b>"App installieren"</b>.';
            }
        }
        function closeTutorial() { localStorage.setItem('tutor_done', 'true'); document.getElementById('pwa-tutorial').style.display = 'none'; }
        
        function generateIcon() {
            const c = document.getElementById('iconCanvas'); const x = c.getContext('2d');
            const g = x.createLinearGradient(0,0,0,512); g.addColorStop(0,"#1e293b"); g.addColorStop(1,"#0f172a");
            x.fillStyle = g; x.fillRect(0,0,512,512); x.fillStyle = "#38bdf8"; x.fillRect(100,240,312,32); x.fillRect(240,100,32,312);
        }
        function downloadIcon() { const a = document.createElement('a'); a.download = 'icon-512.png'; a.href = document.getElementById('iconCanvas').toDataURL(); a.click(); }

        window.onload = () => { updateMiniHistory(); checkTutorial(); generateIcon(); if(location.search==="?gen") document.getElementById('icon-gen-ui').style.display='block'; };
    </script>
</body>
</html>
