<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multi-Modus Taschenrechner | Offline</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1e2a3a 0%, #0f1724 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .calculator {
            max-width: 650px;
            width: 100%;
            background: rgba(22, 34, 48, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .display {
            background: #0a0f1a;
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5), 0 2px 2px rgba(255, 255, 255, 0.05);
            border: 1px solid #2d3e4e;
            min-height: 130px;
        }

        #expression {
            font-size: 1.2rem;
            color: #8aaec0;
            min-height: 32px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            text-align: right;
            letter-spacing: 0.5px;
        }

        #result {
            font-size: 3rem;
            font-weight: 700;
            color: #f0f9ff;
            text-align: right;
            font-family: 'Segoe UI', 'Courier New', monospace;
            word-break: break-word;
            line-height: 1.2;
            margin-top: 8px;
            text-shadow: 0 2px 3px black;
            min-height: 70px;
        }

        .mode-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: #10161f;
            padding: 8px;
            border-radius: 60px;
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            color: #9ab3c5;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        .mode-btn.active {
            background: #2c5a7a;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            text-shadow: 0 1px 0 #1a3f57;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            margin-top: 16px;
        }

        .history-btn {
            background: #2c5a7a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .history-btn:hover {
            background: #3e7a9e;
            transform: scale(1.02);
        }

        .history-panel {
            background: #0a0f1a;
            border-radius: 24px;
            padding: 12px;
            margin-top: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            border: 1px solid #2d3e4e;
        }

        .history-panel.show {
            display: block;
        }

        .history-item {
            background: #1a2533;
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.1s;
            font-family: monospace;
        }

        .history-item:hover {
            background: #2c4053;
            transform: translateX(4px);
        }

        .history-expr {
            color: #8aaec0;
            font-size: 0.9rem;
            word-break: break-word;
            flex: 1;
        }

        .history-val {
            color: #e68a2e;
            font-weight: bold;
            margin-left: 15px;
            font-size: 1rem;
        }

        .clear-history {
            background: #a03e3e;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            background: #1e2f3c;
            border: none;
            padding: 14px 0;
            border-radius: 28px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #eef4ff;
            font-family: 'Segoe UI', 'Courier New', monospace;
            transition: all 0.1s linear;
            box-shadow: 0 5px 0 #0a1117;
            cursor: pointer;
            text-align: center;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0a1117;
        }

        .btn-op {
            background: #2c4c6c;
            color: white;
            font-size: 1.4rem;
        }

        .btn-equal {
            background: #e68a2e;
            box-shadow: 0 5px 0 #9b4e1a;
            color: white;
            font-size: 1.6rem;
        }

        .btn-clear {
            background: #a03e3e;
            box-shadow: 0 5px 0 #5e2626;
        }

        .btn-func {
            background: #2d5f6e;
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-mem {
            background: #3a4a5e;
        }

        .btn-bit {
            background: #4a3e5e;
            font-family: monospace;
            font-weight: bold;
        }

        .scientific-grid button, .programmer-grid button {
            font-size: 1rem;
            padding: 12px 0;
        }

        .programmer-panel {
            background: #0d1722;
            border-radius: 28px;
            padding: 12px;
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-family: monospace;
        }

        .bit-indicator {
            color: #b7e1f0;
            font-size: 0.85rem;
            background: #00000055;
            padding: 6px 12px;
            border-radius: 20px;
            font-family: monospace;
            word-break: break-all;
        }

        @media (max-width: 550px) {
            .buttons {
                gap: 8px;
            }
            button {
                padding: 10px 0;
                font-size: 0.9rem;
            }
            .btn-op {
                font-size: 1.1rem;
            }
            #result {
                font-size: 2.2rem;
                min-height: 55px;
            }
            .mode-btn {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="display">
        <div id="expression">0</div>
        <div id="result">0</div>
    </div>

    <div class="mode-tabs">
        <button class="mode-btn active" data-mode="standard">📟 Standard</button>
        <button class="mode-btn" data-mode="scientific">🔬 Wissenschaft</button>
        <button class="mode-btn" data-mode="programmer">💻 Programmierer</button>
    </div>

    <div class="history-header">
        <button id="historyToggleBtn" class="history-btn">📜 Verlauf anzeigen</button>
    </div>

    <div id="historyPanel" class="history-panel">
        <button id="clearHistoryBtn" class="clear-history">🗑 Verlauf löschen</button>
        <div id="historyList"></div>
    </div>

    <div id="buttonPanel" class="buttons"></div>
    <div id="programmerInfo" style="margin-top: 16px; min-height: 70px;"></div>
</div>

<script>
    // ---------- Globale Zustände ----------
    let currentMode = "standard";
    let currentInput = "0";
    let memoryValue = 0;
    let history = [];
    let justCalculated = false;

    // Hilfsfunktionen
    function updateDisplay() {
        const exprDiv = document.getElementById('expression');
        const resultDiv = document.getElementById('result');
        
        if (!currentInput || currentInput === "") {
            currentInput = "0";
        }
        exprDiv.innerText = currentInput;
        
        let evalResult = tryEvaluate(currentInput);
        if (evalResult !== null && !isNaN(evalResult) && isFinite(evalResult)) {
            let formatted = formatResult(evalResult);
            resultDiv.innerText = formatted;
        } else {
            resultDiv.innerText = "";
        }
        
        if (currentMode === "programmer") {
            let num = tryEvaluate(currentInput);
            if (num !== null && !isNaN(num) && isFinite(num)) {
                updateProgrammerInfo(num);
            } else {
                const infoDiv = document.getElementById('programmerInfo');
                if (infoDiv) infoDiv.innerHTML = `<div class="programmer-panel"><span class="bit-indicator">⚙️ Gib eine Zahl ein für HEX/BIN</span></div>`;
            }
        } else {
            const infoDiv = document.getElementById('programmerInfo');
            if (infoDiv) infoDiv.innerHTML = "";
        }
    }
    
    function tryEvaluate(expr) {
        if (!expr || expr.trim() === "" || expr === "Fehler") return null;
        
        let trimmed = expr.trim();
        let lastChar = trimmed.slice(-1);
        if (["+", "-", "*", "/", "%", "^", "&", "|", "(", ")", "~", "<<"].includes(lastChar)) {
            return null;
        }
        
        let openParens = (expr.match(/\(/g) || []).length;
        let closeParens = (expr.match(/\)/g) || []).length;
        if (openParens !== closeParens) return null;
        
        try {
            let clean = expr.replace(/,/g, '.');
            clean = clean.replace(/\^/g, '**');
            clean = clean.replace(/π/g, 'Math.PI');
            clean = clean.replace(/e(?![a-z])/g, 'Math.E');
            clean = clean.replace(/sin\(/g, 'Math.sin(');
            clean = clean.replace(/cos\(/g, 'Math.cos(');
            clean = clean.replace(/tan\(/g, 'Math.tan(');
            clean = clean.replace(/asin\(/g, 'Math.asin(');
            clean = clean.replace(/acos\(/g, 'Math.acos(');
            clean = clean.replace(/atan\(/g, 'Math.atan(');
            clean = clean.replace(/sqrt\(/g, 'Math.sqrt(');
            clean = clean.replace(/ln\(/g, 'Math.log(');
            clean = clean.replace(/log\(/g, 'Math.log10(');
            
            if (currentMode === "programmer") {
                clean = clean.replace(/\b([0-9A-Fa-f]+)\b/g, (match) => {
                    if (/^[0-9A-Fa-f]+$/.test(match) && !isNaN(parseInt(match, 16))) {
                        return parseInt(match, 16);
                    }
                    return match;
                });
            }
            
            const fn = new Function('return (' + clean + ')');
            let val = fn();
            if (isNaN(val) || !isFinite(val)) return null;
            return val;
        } catch(e) {
            return null;
        }
    }
    
    function formatResult(num) {
        if (isNaN(num) || !isFinite(num)) return "0";
        if (Math.abs(num) > 1e12) return num.toExponential(6);
        if (Number.isInteger(num)) return num.toString();
        let rounded = Math.round(num * 1e10) / 1e10;
        return rounded.toString();
    }
    
    function updateProgrammerInfo(value) {
        const infoDiv = document.getElementById('programmerInfo');
        if (!infoDiv) return;
        if (isNaN(value) || !isFinite(value)) {
            infoDiv.innerHTML = `<div class="programmer-panel"><span class="bit-indicator">⚠️ Ungültiger Wert</span></div>`;
            return;
        }
        let intVal = Math.floor(Math.abs(value)) * (value < 0 ? -1 : 1);
        if (intVal > 2**53 - 1) intVal = 2**53 - 1;
        if (intVal < -(2**53-1)) intVal = -(2**53-1);
        
        let hexStr = intVal.toString(16).toUpperCase();
        let binStr = intVal.toString(2);
        let decStr = intVal.toString();
        let octStr = intVal.toString(8);
        
        infoDiv.innerHTML = `
            <div class="programmer-panel">
                <div class="bit-indicator">🔢 DEC: ${decStr}</div>
                <div class="bit-indicator">🔷 HEX: 0x${hexStr}</div>
                <div class="bit-indicator">🔸 OCT: 0o${octStr}</div>
                <div class="bit-indicator">📀 BIN: ${binStr}</div>
            </div>
        `;
    }
    
    function addToHistory(expression, result) {
        if (!expression || expression === "0" || expression === "Fehler") return;
        if (result === "" || result === undefined) return;
        history.unshift({ expression: expression, result: result });
        if (history.length > 30) history.pop();
        updateHistoryDisplay();
    }
    
    function updateHistoryDisplay() {
        const historyList = document.getElementById('historyList');
        if (!historyList) return;
        
        if (history.length === 0) {
            historyList.innerHTML = '<div style="text-align:center; color:#6a7e8e; padding:20px;">Kein Verlauf vorhanden</div>';
            return;
        }
        
        historyList.innerHTML = history.map((item, index) => `
            <div class="history-item" data-index="${index}">
                <span class="history-expr">${item.expression}</span>
                <span class="history-val">= ${item.result}</span>
            </div>
        `).join('');
        
        document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const index = parseInt(el.getAttribute('data-index'));
                if (!isNaN(index) && history[index]) {
                    currentInput = history[index].result;
                    justCalculated = true;
                    updateDisplay();
                }
            });
        });
    }
    
    function clearHistory() {
        history = [];
        updateHistoryDisplay();
    }
    
    function isOperatorEnd(expr) {
        if (!expr) return false;
        let last = expr.slice(-1);
        return ["+", "-", "*", "/", "%", "^", "&", "|", "~", "("].includes(last);
    }
    
    // Haupteingabe
    function handleInput(value) {
        // Spezialbefehle
        if (value === "AC") {
            currentInput = "0";
            justCalculated = false;
            updateDisplay();
            return;
        }
        if (value === "C" || value === "CE") {
            currentInput = "0";
            justCalculated = false;
            updateDisplay();
            return;
        }
        if (value === "=") {
            let evaluated = tryEvaluate(currentInput);
            if (evaluated !== null && !isNaN(evaluated) && isFinite(evaluated)) {
                let resultStr = formatResult(evaluated);
                if (currentInput !== resultStr && currentInput !== "0" && currentInput !== "") {
                    addToHistory(currentInput, resultStr);
                }
                currentInput = resultStr;
                justCalculated = true;
            }
            updateDisplay();
            return;
        }
        if (value === "+/-") {
            if (justCalculated) {
                let num = parseFloat(currentInput);
                if (!isNaN(num)) {
                    currentInput = (-num).toString();
                    justCalculated = false;
                }
            } else {
                let num = tryEvaluate(currentInput);
                if (num !== null && !isNaN(num)) {
                    currentInput = (-num).toString();
                }
            }
            updateDisplay();
            return;
        }
        if (value === "%") {
            let num = tryEvaluate(currentInput);
            if (num !== null && !isNaN(num)) {
                currentInput = (num / 100).toString();
                justCalculated = false;
                updateDisplay();
            }
            return;
        }
        
        // Speicherfunktionen
        if (value === "M+") {
            let val = tryEvaluate(currentInput);
            if (val !== null && !isNaN(val)) memoryValue += val;
            updateDisplay();
            return;
        }
        if (value === "M-") {
            let val = tryEvaluate(currentInput);
            if (val !== null && !isNaN(val)) memoryValue -= val;
            updateDisplay();
            return;
        }
        if (value === "MR") {
            currentInput = memoryValue.toString();
            justCalculated = true;
            updateDisplay();
            return;
        }
        if (value === "MC") {
            memoryValue = 0;
            updateDisplay();
            return;
        }
        
        // Wissenschaftliche Funktionen
        if (["sin", "cos", "tan", "asin", "acos", "atan", "sqrt", "ln", "log", "x²"].includes(value)) {
            let num = tryEvaluate(currentInput);
            if (num !== null && !isNaN(num)) {
                let res;
                if (value === "sin") res = Math.sin(num);
                else if (value === "cos") res = Math.cos(num);
                else if (value === "tan") res = Math.tan(num);
                else if (value === "asin") res = Math.asin(num);
                else if (value === "acos") res = Math.acos(num);
                else if (value === "atan") res = Math.atan(num);
                else if (value === "sqrt") res = Math.sqrt(Math.abs(num));
                else if (value === "ln") res = Math.log(num);
                else if (value === "log") res = Math.log10(num);
                else if (value === "x²") res = num * num;
                currentInput = res.toString();
                justCalculated = true;
                updateDisplay();
            }
            return;
        }
        
        // 1/x
        if (value === "1/x") {
            let num = tryEvaluate(currentInput);
            if (num !== null && !isNaN(num) && num !== 0) {
                currentInput = (1 / num).toString();
                justCalculated = true;
                updateDisplay();
            }
            return;
        }
        
        // Konstanten
        if (value === "π") {
            if (justCalculated || currentInput === "0" || currentInput === "Fehler") {
                currentInput = "π";
                justCalculated = false;
            } else {
                currentInput += "π";
            }
            updateDisplay();
            return;
        }
        if (value === "e") {
            if (justCalculated || currentInput === "0" || currentInput === "Fehler") {
                currentInput = "e";
                justCalculated = false;
            } else {
                currentInput += "e";
            }
            updateDisplay();
            return;
        }
        
        // Potenz
        if (value === "xʸ") {
            if (justCalculated) {
                currentInput = currentInput + "^";
                justCalculated = false;
            } else if (!isOperatorEnd(currentInput) && currentInput !== "") {
                currentInput += "^";
            } else if (currentInput === "0") {
                currentInput = "0^";
            }
            updateDisplay();
            return;
        }
        
        // Klammern
        if (value === "(") {
            if (justCalculated || currentInput === "0" || currentInput === "Fehler") {
                currentInput = "(";
                justCalculated = false;
            } else {
                currentInput += "(";
            }
            updateDisplay();
            return;
        }
        if (value === ")") {
            currentInput += ")";
            justCalculated = false;
            updateDisplay();
            return;
        }
        
        // Ziffern und Punkt
        if (/^[\d.]$/.test(value)) {
            if (justCalculated) {
                currentInput = value;
                justCalculated = false;
            } else if (currentInput === "0" || currentInput === "Fehler") {
                currentInput = value;
            } else {
                if (value === ".") {
                    let lastNumber = currentInput.split(/[\+\-\*\/%\(\)\^\&\|\~\[\]\<\>]/).pop();
                    if (lastNumber && lastNumber.includes(".")) return;
                }
                currentInput += value;
            }
            updateDisplay();
            return;
        }
        
        // Operatoren
        if (["+", "-", "*", "/", "%", "^", "&", "|", "<<", ">>", "~"].includes(value)) {
            if (justCalculated) {
                justCalculated = false;
                currentInput = currentInput + value;
            } else if ((currentInput === "0" || currentInput === "") && value === "-") {
                currentInput = "-";
            } else if (isOperatorEnd(currentInput)) {
                currentInput = currentInput.slice(0, -1) + value;
            } else {
                currentInput += value;
            }
            updateDisplay();
            return;
        }
        
        // Hexadezimale Buchstaben für Programmierer
        if (currentMode === "programmer" && /^[A-F]$/i.test(value)) {
            if (justCalculated) {
                currentInput = value.toUpperCase();
                justCalculated = false;
            } else if (currentInput === "0" || currentInput === "Fehler") {
                currentInput = value.toUpperCase();
            } else {
                currentInput += value.toUpperCase();
            }
            updateDisplay();
            return;
        }
        
        // Modulo
        if (value === "Mod") {
            if (justCalculated) {
                currentInput = currentInput + "%";
                justCalculated = false;
            } else if (!isOperatorEnd(currentInput) && currentInput !== "") {
                currentInput += "%";
            } else if (currentInput === "0") {
                currentInput = "0%";
            }
            updateDisplay();
            return;
        }
        
        // Bitweise Operatoren
        if (value === "AND") {
            if (justCalculated) {
                currentInput = currentInput + "&";
                justCalculated = false;
            } else if (!isOperatorEnd(currentInput) && currentInput !== "") {
                currentInput += "&";
            }
            updateDisplay();
            return;
        }
        if (value === "OR") {
            if (justCalculated) {
                currentInput = currentInput + "|";
                justCalculated = false;
            } else if (!isOperatorEnd(currentInput) && currentInput !== "") {
                currentInput += "|";
            }
            updateDisplay();
            return;
        }
        if (value === "XOR") {
            if (justCalculated) {
                currentInput = currentInput + "^";
                justCalculated = false;
            } else if (!isOperatorEnd(currentInput) && currentInput !== "") {
                currentInput += "^";
            }
            updateDisplay();
            return;
        }
        if (value === "NOT") {
            if (justCalculated) {
                currentInput = "~" + currentInput;
                justCalculated = false;
            } else if (!isOperatorEnd(currentInput) && currentInput !== "") {
                currentInput += "~";
            } else if (currentInput === "0") {
                currentInput = "~";
            }
            updateDisplay();
            return;
        }
    }
    
    // Button-Layouts
    function renderButtons() {
        const container = document.getElementById('buttonPanel');
        if (!container) return;
        container.className = "buttons";
        
        let buttons = [];
        
        if (currentMode === "standard") {
            buttons = [
                ["MC", "M+", "M-", "MR", "C"],
                ["%", "CE", "C", "/", "x²"],
                ["7", "8", "9", "*", "√"],
                ["4", "5", "6", "-", "1/x"],
                ["1", "2", "3", "+", "="],
                ["0", ".", "+/-", "(", ")"]
            ];
            container.classList.remove("scientific-grid", "programmer-grid");
        } 
        else if (currentMode === "scientific") {
            buttons = [
                ["MC", "M+", "M-", "MR", "C"],
                ["sin", "cos", "tan", "π", "e"],
                ["asin", "acos", "atan", "ln", "log"],
                ["x²", "xʸ", "sqrt", "(", ")"],
                ["7", "8", "9", "/", "%"],
                ["4", "5", "6", "*", "1/x"],
                ["1", "2", "3", "-", "="],
                ["0", ".", "+/-", "+", "CE"]
            ];
            container.classList.add("scientific-grid");
            container.classList.remove("programmer-grid");
        } 
        else if (currentMode === "programmer") {
            buttons = [
                ["MC", "M+", "M-", "MR", "C"],
                ["A", "B", "C", "D", "E"],
                ["F", "7", "8", "9", "Mod"],
                ["4", "5", "6", "AND", "OR"],
                ["1", "2", "3", "XOR", "NOT"],
                ["0", ".", "+/-", "<<", ">>"],
                ["(", ")", "+", "-", "*"],
                ["/", "%", "=", "CE", "AC"]
            ];
            container.classList.add("programmer-grid");
            container.classList.remove("scientific-grid");
        }
        
        container.innerHTML = "";
        for (let row of buttons) {
            for (let btnLabel of row) {
                const btn = document.createElement("button");
                btn.innerText = btnLabel;
                
                if (btnLabel === "=") btn.classList.add("btn-equal");
                else if (["+", "-", "*", "/", "%", "^", "&", "|", ">>", "<<", "~", "AND", "OR", "XOR", "NOT", "Mod"].includes(btnLabel)) 
                    btn.classList.add("btn-op");
                else if (btnLabel === "C" || btnLabel === "CE" || btnLabel === "AC") btn.classList.add("btn-clear");
                else if (["sin","cos","tan","asin","acos","atan","ln","log","sqrt","x²","xʸ","π","e","1/x","√"].includes(btnLabel)) 
                    btn.classList.add("btn-func");
                else if (btnLabel === "MC" || btnLabel === "M+" || btnLabel === "M-" || btnLabel === "MR") 
                    btn.classList.add("btn-mem");
                else if (["A","B","C","D","E","F","AND","OR","XOR","NOT","Mod","<<",">>"].includes(btnLabel))
                    btn.classList.add("btn-bit");
                
                btn.addEventListener("click", (function(label) {
                    return function() { handleInput(label); };
                })(btnLabel));
                container.appendChild(btn);
            }
        }
    }
    
    function setMode(mode) {
        currentMode = mode;
        currentInput = "0";
        justCalculated = false;
        renderButtons();
        updateDisplay();
        
        // Aktiviere den richtigen Tab
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.getAttribute('data-mode') === mode) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    // Tastaturunterstützung
    function handleKeyboard(e) {
        const key = e.key;
        
        if (key === 'Enter') {
            e.preventDefault();
            handleInput('=');
        } else if (key === 'Escape') {
            handleInput('AC');
        } else if (key === 'Backspace') {
            e.preventDefault();
            if (justCalculated) {
                currentInput = "0";
                justCalculated = false;
            } else if (currentInput.length > 1 && currentInput !== "Fehler") {
                currentInput = currentInput.slice(0, -1);
                if (currentInput === "") currentInput = "0";
            } else {
                currentInput = "0";
            }
            updateDisplay();
        } else if (/^[0-9.]$/.test(key)) {
            e.preventDefault();
            handleInput(key);
        } else if (['+', '-', '*', '/', '%', '(', ')'].includes(key)) {
            e.preventDefault();
            handleInput(key);
        }
    }
    
    // Event-Listener für Modus-Wechsel
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const mode = this.getAttribute('data-mode');
            setMode(mode);
        });
    });
    
    // History Toggle
    document.getElementById('historyToggleBtn').addEventListener('click', () => {
        const panel = document.getElementById('historyPanel');
        const btn = document.getElementById('historyToggleBtn');
        if (panel.classList.contains('show')) {
            panel.classList.remove('show');
            btn.innerText = '📜 Verlauf anzeigen';
        } else {
            panel.classList.add('show');
            btn.innerText = '📜 Verlauf ausblenden';
            updateHistoryDisplay();
        }
    });
    
    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
        clearHistory();
    });
    
    document.addEventListener('keydown', handleKeyboard);
    
    // Initialisierung
    setMode("standard");
    updateHistoryDisplay();
</script>
</body>
</html>
