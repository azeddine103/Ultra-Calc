<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f3f4f7">
	<link rel="icon" type="image/png" href="calculator.png">
	<link rel="apple-touch-icon" href="calculator.png">
    <title>Sci Calc</title>
    <style>
        :root {
            --bg: #f3f4f7;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --btn-num: #ffffff;
            --btn-sci: #f1f3f6;
            --btn-op: #e5e7eb;
            --accent: #ff7e32;
            --hist-text: #8e8e93;
        }

        /* Automatischer Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #1c1c1e;
                --text: #ffffff;
                --btn-num: #2c2c2e;
                --btn-sci: #1c1c1e;
                --btn-op: #3a3a3c;
                --hist-text: #8e8e93;
            }
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none !important; 
            -webkit-touch-callout: none;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
        }

        header {
            display: flex;
            justify-content: flex-start; /* Nur noch linksbündig für Verlauf */
            padding: 20px 25px 0 25px;
        }

        .icon-btn {
            background: none; border: none; font-size: 1.6rem; color: var(--hist-text); cursor: pointer;
        }

        .display-container {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px 30px 40px 30px;
        }

        .mini-history {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 10px;
            min-height: 50px;
        }

        .hist-line {
            text-align: right;
            color: var(--hist-text);
            font-size: 1.1rem;
            opacity: 0.7;
        }

        #main-display {
            text-align: right;
            font-size: clamp(3rem, 15vw, 5rem);
            font-weight: 300;
            overflow-x: auto;
            white-space: nowrap;
            border: none;
            background: transparent;
        }

        /* Keypad Layout */
        .keypad {
            background: var(--card-bg);
            border-radius: 40px 40px 0 0;
            padding: 25px 15px calc(20px + env(safe-area-inset-bottom));
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 12px;
            height: 75%; 
            box-shadow: 0 -20px 45px rgba(0,0,0,0.1);
        }

        button {
            border: none;
            border-radius: 50%;
            background: var(--btn-sci);
            color: var(--text);
            font-size: clamp(0.9rem, 5vw, 1.3rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        button:active { filter: brightness(0.8); transform: scale(0.95); }

        .btn-num { background: var(--btn-num); font-size: 1.7rem; }
        .btn-op { background: var(--btn-op); font-size: 1.5rem; }
        .btn-equal { 
            background: var(--accent); 
            color: white; 
            border-radius: 45px; 
            grid-column: span 3; 
            font-size: 2rem;
        }
        
        .wide { grid-column: span 3; border-radius: 45px; }

        /* Verlauf Modal */
        #history-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; z-index: 2000;
            flex-direction: column; padding: 25px;
        }
    </style>
</head>
<body>

    <header>
        <button class="icon-btn" onclick="toggleFullHistory()">🕒</button>
        </header>

    <div class="display-container">
        <div class="mini-history" id="mini-history"></div>
        <div id="main-display">0</div>
    </div>

    <div class="keypad">
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button onclick="mem('MC')">MC</button>
        <button onclick="mem('M+')">M+</button>
        <button onclick="mem('M-')">M-</button>
        <button onclick="mem('MR')">MR</button>

        <button onclick="fact()">x!</button>
        <button onclick="append('**2')">x²</button>
        <button onclick="append('**3')">x³</button>
        <button onclick="append('**')">xʸ</button>
        <button onclick="append('Math.exp(')">eˣ</button>
        <button onclick="append('Math.PI')">π</button>

        <button onclick="append('1/')">1/x</button>
        <button onclick="append('Math.sqrt(')">√</button>
        <button onclick="append('Math.cbrt(')">∛x</button>
        <button onclick="yroot()">ʸ√x</button>
        <button onclick="alert('Inv Modus')">Inv</button>
        <button onclick="alert('Rad Modus')">Rad</button>

        <button onclick="append('Math.E')">e</button>
        <button onclick="append('Math.log(')">ln</button>
        <button onclick="append('Math.log10(')">log</button>
        <button onclick="append('Math.sin(')">sin</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>

        <button class="btn-op" style="color:#ef4444" onclick="clearAll()">C</button>
        <button class="btn-op" onclick="append('%')">%</button>
        <button class="btn-op" onclick="backspace()">⌫</button>
        <button class="btn-op wide" onclick="append('/')">÷</button>

        <button class="btn-num" onclick="append('7')">7</button>
        <button class="btn-num" onclick="append('8')">8</button>
        <button class="btn-num" onclick="append('9')">9</button>
        <button class="btn-op wide" onclick="append('*')">×</button>

        <button class="btn-num" onclick="append('4')">4</button>
        <button class="btn-num" onclick="append('5')">5</button>
        <button class="btn-num" onclick="append('6')">6</button>
        <button class="btn-op wide" onclick="append('-')">−</button>

        <button class="btn-num" onclick="append('1')">1</button>
        <button class="btn-num" onclick="append('2')">2</button>
        <button class="btn-num" onclick="append('3')">3</button>
        <button class="btn-op wide" onclick="append('+')">+</button>

        <button class="btn-num" onclick="plusMinus()">+/-</button>
        <button class="btn-num" onclick="append('0')">0</button>
        <button class="btn-num" onclick="append('.')">,</button>
        <button class="btn-equal" onclick="calculate()">=</button>
    </div>

    <div id="history-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">Verlauf</h2>
            <button onclick="toggleFullHistory()" style="font-size:2rem; background:none; border:none; color:var(--text)">✕</button>
        </div>
        <div id="full-history-list" style="overflow-y:auto; flex:1;"></div>
        <button onclick="clearHistory()" style="background:#ef4444; color:white; border:none; padding:18px; border-radius:15px; margin-top:10px; font-weight:bold;">Verlauf löschen</button>
    </div>

    <script>
        const display = document.getElementById('main-display');
        const miniHist = document.getElementById('mini-history');
        let history = JSON.parse(localStorage.getItem('calc_v8_honor')) || [];
        let isRes = false;
        let memory = 0;

        function append(v) {
            if (isRes && !isNaN(v)) { display.innerText = '0'; isRes = false; }
            if (display.innerText === '0' && !isNaN(v)) display.innerText = v;
            else display.innerText += v;
            isRes = false;
        }

        function calculate() {
            try {
                let expr = display.innerText.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                let r = eval(expr);
                let f = Number.isInteger(r) ? r : parseFloat(r.toFixed(8));
                saveH(display.innerText, f);
                display.innerText = f;
                isRes = true;
            } catch { display.innerText = "Error"; isRes = true; }
        }

        function saveH(e, r) {
            history.unshift({e, r});
            localStorage.setItem('calc_v8_honor', JSON.stringify(history.slice(0, 50)));
            updateUI();
        }

        function updateUI() {
            miniHist.innerHTML = history.slice(0, 2).reverse().map(h => `<div class="hist-line">${h.e} = ${h.r}</div>`).join('');
        }

        function toggleFullHistory() {
            const modal = document.getElementById('history-modal');
            const list = document.getElementById('full-history-list');
            const isOpen = modal.style.display === 'flex';
            modal.style.display = isOpen ? 'none' : 'flex';
            if (!isOpen) {
                list.innerHTML = history.map(h => `<div style="padding:20px; border-bottom:1px solid #8884; text-align:right" onclick="useHist('${h.r}')"><small style="color:var(--hist-text)">${h.e}</small><br><strong style="font-size:1.4rem">= ${h.r}</strong></div>`).join('');
            }
        }

        function useHist(v) { display.innerText = v; toggleFullHistory(); isRes = true; }
        function clearHistory() { if(confirm("Verlauf löschen?")) { history = []; localStorage.removeItem('calc_v8_honor'); updateUI(); toggleFullHistory(); } }
        function clearAll() { display.innerText = '0'; isRes = false; }
        function backspace() { display.innerText = display.innerText.length > 1 ? display.innerText.slice(0, -1) : '0'; }
        function plusMinus() { display.innerText = (parseFloat(display.innerText) * -1).toString(); }
        function fact() { let n = parseInt(display.innerText); let r = 1; for(let i=2; i<=n; i++) r *= i; display.innerText = r; isRes = true; }
        function mem(t) {
            let v = parseFloat(display.innerText);
            if(t==='M+') memory += v; if(t==='M-') memory -= v;
            if(t==='MC') memory = 0; if(t==='MR') { display.innerText = memory; isRes = true; }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
